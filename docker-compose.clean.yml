services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xposter
      POSTGRES_USER: xposter
      POSTGRES_PASSWORD: xposter
    ports:
      - "55432:5432"
    volumes:
      - postgres-clean-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xposter -d xposter"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-clean-data:
